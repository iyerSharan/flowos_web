name: Add Waitlist Entry

on:
  workflow_dispatch:
    inputs:
      iv:
        description: AES-GCM IV (base64)
        required: true
      ciphertext:
        description: Encrypted payload (base64)
        required: true
      ts:
        description: ISO timestamp
        required: true

jobs:
  append:
    runs-on: ubuntu-latest
    steps:
      # Check out the PRIVATE waitlist repo using WL_WRITE_TOKEN
      - uses: actions/checkout@v4
        with:
          repository: iyerSharan/flowos-waitlist
          token: ${{ secrets.WL_WRITE_TOKEN }}
          path: waitlist-repo

      - name: Append encrypted entry
        run: |
          python3 - <<'EOF'
          import json, os

          entry = {
            "iv":         os.environ["IV"],
            "ciphertext": os.environ["CT"],
            "ts":         os.environ["TS"]
          }

          path = "waitlist-repo/waitlist.json"
          with open(path, "r") as f:
            data = json.load(f)

          data.append(entry)

          with open(path, "w") as f:
            json.dump(data, f, indent=2)

          print(f"waitlist.json now has {len(data)} entries")
          EOF
        env:
          IV: ${{ github.event.inputs.iv }}
          CT: ${{ github.event.inputs.ciphertext }}
          TS: ${{ github.event.inputs.ts }}

      - name: Commit to private waitlist repo
        run: |
          cd waitlist-repo
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add waitlist.json
          git commit -m "waitlist: entry ${{ github.event.inputs.ts }}"
          git push
